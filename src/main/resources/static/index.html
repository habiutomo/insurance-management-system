<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insurance Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="app">
    <div id="loading-screen" class="loading-screen">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div id="login-page" class="login-page d-none">
      <div class="login-container">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <div class="mb-3">
                <i class="fas fa-shield-halved fa-3x text-primary"></i>
              </div>
              <h3 class="fw-bold">Insurance MS</h4>
              <p class="text-muted">Sign in to your account</p>
            </div>
            <form id="login-form">
              <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-user"></i></span>
                  <input type="text" class="form-control" id="login-username" placeholder="Enter username" required autofocus>
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-lock"></i></span>
                  <input type="password" class="form-control" id="login-password" placeholder="Enter password" required>
                </div>
              </div>
              <div id="login-error" class="alert alert-danger d-none"></div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="fas fa-right-to-bracket me-2"></i>Sign In
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div id="main-app" class="d-none">
      <nav class="navbar navbar-dark bg-primary navbar-expand-lg fixed-top shadow-sm">
        <div class="container-fluid">
          <a class="navbar-brand fw-bold" href="#" onclick="app.navigate('dashboard')">
            <i class="fas fa-shield-halved me-2"></i>Insurance MS
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarNav">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="sidebarNav">
            <ul class="navbar-nav me-auto">
              <li class="nav-item"><a class="nav-link" href="#" data-page="dashboard"><i class="fas fa-chart-pie me-1"></i>Dashboard</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="customers"><i class="fas fa-users me-1"></i>Customers</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="policies"><i class="fas fa-file-contract me-1"></i>Policies</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="claims"><i class="fas fa-file-invoice me-1"></i>Claims</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="payments"><i class="fas fa-credit-card me-1"></i>Payments</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="agents"><i class="fas fa-user-tie me-1"></i>Agents</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="commissions"><i class="fas fa-hand-holding-dollar me-1"></i>Commissions</a></li>
              <li class="nav-item admin-only d-none"><a class="nav-link" href="#" data-page="users"><i class="fas fa-user-gear me-1"></i>Users</a></li>
            </ul>
            <ul class="navbar-nav">
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                  <i class="fas fa-circle-user me-1"></i><span id="user-display-name">User</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li><a class="dropdown-item" href="#" data-page="profile"><i class="fas fa-user me-2"></i>Profile</a></li>
                  <li><hr class="dropdown-divider"></li>
                  <li><a class="dropdown-item text-danger" href="#" id="logout-btn"><i class="fas fa-sign-out me-2"></i>Logout</a></li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <div class="container-fluid page-content" id="page-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="fw-bold mb-0" id="page-title">Dashboard</h4>
          <div>
            <span class="badge bg-primary" id="user-role-badge">ADMIN</span>
          </div>
        </div>
        <div id="page-container"></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modal-form" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-title">Form</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modal-body">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="modal-save-btn"><i class="fas fa-save me-1"></i>Save</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modal-confirm" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title" id="confirm-title">Confirm</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="confirm-body">Are you sure?</div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirm-yes-btn"><i class="fas fa-check me-1"></i>Yes</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/customers.js"></script>
  <script src="js/pages/policies.js"></script>
  <script src="js/pages/claims.js"></script>
  <script src="js/pages/payments.js"></script>
  <script src="js/pages/agents.js"></script>
  <script src="js/pages/commissions.js"></script>
  <script src="js/pages/users.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
