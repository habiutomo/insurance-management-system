# Application
spring.application.name=insurance-management-system
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/insurance_db?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=c2VjdXJlLXNlY3JldC1rZXktZm9yLWluc3VyYW5jZS1tYW5hZ2VtZW50LXN5c3RlbS0yMDI0
jwt.expiration=86400000

# Jackson
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
